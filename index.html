<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Dukan — Ghar Baithe Kirana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ========== TOP HEADER ========== -->
<header class="top-header" id="topHeader">
    <div class="header-brand" onclick="window.location.href='index.html'">
        <span class="brand-icon">🛒</span>
        <div class="brand-text-wrapper">
            <span class="brand-text"><span class="quick-text">QUICK</span><span class="dukan-text">DUKAN</span></span>
        </div>
    </div>
    <div class="free-delivery">
        <div class="truck-icon-wrapper"><span class="truck-icon">🚚</span><span class="exhaust-puff">💨</span></div>
        <span class="free-text">Free Delivery*</span>
        <div class="road-lines"></div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="toggle-icon" id="toggleIcon">🌙</span>
    </button>
</header>

<!-- ========== SEARCH BAR ========== -->
<div class="search-wrapper" id="searchWrapper">
    <div class="search-container">
        <span class="search-icon" onclick="document.getElementById('searchInput').focus()">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search atta, chawal, sabun..." autocomplete="off">
        <span class="voice-icon" title="Voice Search">🎤</span>
    </div>
    <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
</div>

<!-- ========== CATEGORIES BAR ========== -->
<div class="categories-bar-wrapper" id="categoriesBarWrapper">
    <div class="categories-bar-container">
        <button class="cat-scroll-arrow cat-scroll-left" onclick="document.getElementById('categoriesBar').scrollBy({left:-200,behavior:'smooth'})">◄</button>
        <div class="categories-bar" id="categoriesBar"></div>
        <button class="cat-scroll-arrow cat-scroll-right" onclick="document.getElementById('categoriesBar').scrollBy({left:200,behavior:'smooth'})">►</button>
    </div>
    <div class="cat-fade-left"></div>
    <div class="cat-fade-right"></div>
    <div class="cat-scroll-dots" id="catScrollDots"></div>
</div>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content-full">

    <div class="recently-viewed-section" id="recentlyViewedSection">
        <h2 class="section-heading">👁️ Recently Viewed</h2>
        <div class="recently-grid" id="recentlyGrid"></div>
    </div>

    <div class="category-back" id="categoryBack" style="display:none;">
        <button class="back-btn" onclick="backToAll()">← Back to All Categories</button>
    </div>

    <h2 class="category-title" id="categoryTitle" style="display:none;"></h2>

    <div class="products-loading" id="productsLoading">
        <div class="loading-spinner"><div class="spinner-circle"></div><div class="spinner-circle spinner-inner"></div><div class="spinner-icon">🛒</div></div>
        <p class="loading-text">Loading products...</p>
    </div>

    <div class="most-ordered-section" id="mostOrderedSection" style="display:none;">
        <h2 class="section-heading">🔥 MOST ORDERED — "Bhopal Ki Pasand"</h2>
        <div class="products-grid" id="productsGrid"></div>
    </div>

    <div class="category-products-section" id="categoryProductsSection" style="display:none;">
        <div class="products-grid" id="categoryProductsGrid"></div>
    </div>

</div>

<!-- ========== CART TOAST ========== -->
<div class="cart-toast" id="cartToast">
    <span class="toast-icon">✅</span>
    <div class="toast-content"><span class="toast-title">Added to Cart!</span><span class="toast-product" id="toastProduct"></span></div>
    <span class="toast-close" onclick="this.parentElement.classList.remove('show')">✕</span>
</div>

<!-- ========== BOTTOM NAVBAR ========== -->
<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="shop.html" class="nav-item"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
        <a href="cart.html" class="nav-item nav-cart">
            <span class="nav-icon-wrapper"><span class="nav-icon">🛒</span><span class="cart-badge" id="cartBadge">0</span></span>
            <span class="nav-label">Cart</span>
        </a>
        <button class="nav-item nav-whatsapp" onclick="openWhatsApp()"><span class="nav-icon">💬</span><span class="nav-label">Whats</span></button>
        <button class="nav-item nav-top" id="navTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="nav-icon">⬆️</span><span class="nav-label">Top</span></button>
    </div>
</nav>

<!-- ========== SCRIPTS ========== -->
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/cart.js"></script>
<script src="js/categories.js"></script>
<script src="js/products.js"></script>
<script src="js/search.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/checkout-modal.js"></script>
<script src="js/header.js"></script>

<script>
function backToAll() { if(typeof Categories!=='undefined') Categories.deselectAll(); }
function openWhatsApp() {
    var msg = 'Hi Quick Dukan, I want to order groceries...';
    if(typeof Cart!=='undefined'){var c=Cart.getCart();if(c.totalItems>0){msg='🛒 *Quick Dukan*\n\n';c.items.forEach(function(i,k){msg+=(k+1)+'. '+i.name+' x'+i.quantity+' = ₹'+(i.price*i.quantity)+'\n';});msg+='\n💰 Total: ₹'+c.totalAmount;}}
    window.open('https://wa.me/919876543210?text='+encodeURIComponent(msg),'_blank');
}
</script>

</body>
</html>
