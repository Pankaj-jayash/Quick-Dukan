<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — Quick Dukan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    
    <!-- ==================== TOP HEADER ==================== -->
    <header class="top-header" id="topHeader">
        <div class="header-brand" onclick="window.location.href='index.html'">
            <span class="brand-icon">🛒</span>
            <div class="brand-text-wrapper">
                <span class="brand-text">
                    <span class="quick-text">QUICK</span>
                    <span class="dukan-text">DUKAN</span>
                </span>
            </div>
        </div>
        <div class="free-delivery">
            <div class="truck-icon-wrapper">
                <span class="truck-icon">🚚</span>
                <span class="exhaust-puff">💨</span>
            </div>
            <span class="free-text">Free Delivery*</span>
            <div class="road-lines"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="toggle-icon" id="toggleIcon">🌙</span>
        </button>
    </header>
    
    <!-- ==================== CART PAGE ==================== -->
    <div class="main-content-full" style="padding-top: calc(var(--header-height) + 20px);">
        
        <h1 class="section-heading">🛒 Your Cart</h1>
        
        <!-- Empty Cart -->
        <div class="cart-empty" id="cartEmpty">
            <div style="text-align:center;padding:60px 20px;">
                <span style="font-size:64px;">🛒</span>
                <h2 style="margin:16px 0 8px;font-family:var(--font-heading);">Your cart is empty</h2>
                <p style="color:var(--text-grey);margin-bottom:20px;">Kuch to add karo yaar!</p>
                <a href="index.html" style="display:inline-block;padding:12px 28px;background:var(--blue-mid);color:#FFF;border-radius:var(--radius-full);font-family:var(--font-heading);font-weight:700;font-size:14px;">🛍️ Start Shopping</a>
            </div>
        </div>
        
        <!-- Cart Items -->
        <div class="cart-items-container" id="cartItemsContainer" style="display:none;">
            <div class="cart-items-list" id="cartItemsList"></div>
            
            <div class="cart-summary">
                <div class="cart-summary-row">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">₹0</span>
                </div>
                <div class="cart-summary-row">
                    <span>Delivery</span>
                    <span style="color:#4CAF50;font-weight:700;">FREE 🎉</span>
                </div>
                <div class="cart-summary-row cart-total-row">
                    <span>Total</span>
                    <span id="cartTotal">₹0</span>
                </div>
                <button class="cart-clear-btn" onclick="clearCart()">🗑️ Clear Cart</button>
                <button class="cart-checkout-btn" onclick="CheckoutModal.open()">📦 Proceed to Checkout</button>
                <button class="cart-continue-btn" onclick="window.location.href='index.html'">🛍️ Continue Shopping</button>
            </div>
        </div>
        
    </div>
    
    <!-- ==================== BOTTOM NAVBAR ==================== -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-inner">
            <button class="nav-item" data-page="home" onclick="navigateTo('index.html')" aria-label="Home">
                <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item" data-page="shop" onclick="navigateTo('shop.html')" aria-label="Shop">
                <span class="nav-icon">🛍️</span><span class="nav-label">Shop</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-cart active" data-page="cart" aria-label="Cart">
                <span class="nav-icon-wrapper">
                    <span class="nav-icon">🛒</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </span>
                <span class="nav-label">Cart</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-whatsapp" onclick="openWhatsApp()" aria-label="WhatsApp">
                <span class="nav-icon">💬</span><span class="nav-label">Whats</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-top" id="navTop" onclick="scrollToTop()" aria-label="Back to Top">
                <span class="nav-icon" id="topIcon">⬆️</span><span class="nav-label">Top</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
        </div>
    </nav>
    
    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        function navigateTo(url) { window.location.href = url; }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        function openWhatsApp() {
            const cart = Cart.getCart();
            let message = 'Hi Quick Dukan, I want to order groceries...';
            if (cart.totalItems > 0) {
                message = '🛒 *Quick Dukan — Order*\n\n';
                cart.items.forEach((item, i) => { message += `${i+1}. ${item.name} × ${item.quantity} = ₹${item.price * item.quantity}\n`; });
                message += `\n💰 Total: ₹${cart.totalAmount}`;
            }
            window.open(`https://wa.me/${CONFIG.store.phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function renderCart() {
            const cart = Cart.getCart();
            const emptyEl = document.getElementById('cartEmpty');
            const container = document.getElementById('cartItemsContainer');
            const list = document.getElementById('cartItemsList');
            const badge = document.getElementById('cartBadge');
            
            if (badge) {
                badge.textContent = cart.totalItems;
                badge.classList.toggle('visible', cart.totalItems > 0);
            }
            
            if (cart.totalItems === 0) {
                emptyEl.style.display = 'block';
                container.style.display = 'none';
                return;
            }
            
            emptyEl.style.display = 'none';
            container.style.display = 'block';
            
            list.innerHTML = cart.items.map(item => `
                <div class="cart-item-card">
                    <div class="cart-item-icon">${item.icon || '📦'}</div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-weight">${item.weight || ''}</div>
                        <div class="cart-item-price">₹${item.price} × ${item.quantity} = ₹${item.price * item.quantity}</div>
                    </div>
                    <div class="cart-item-actions">
                        <div class="cart-qty-controls">
                            <button class="cart-qty-btn" onclick="updateQty('${item.id}', ${item.quantity - 1})">−</button>
                            <span>${item.quantity}</span>
                            <button class="cart-qty-btn" onclick="updateQty('${item.id}', ${item.quantity + 1})">+</button>
                        </div>
                        <button class="cart-remove-btn" onclick="removeItem('${item.id}')">❌</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('cartSubtotal').textContent = `₹${cart.totalAmount}`;
            document.getElementById('cartTotal').textContent = `₹${cart.totalAmount}`;
        }
        
        function updateQty(id, qty) {
            if (qty <= 0) { Cart.removeItem(id); }
            else { Cart.updateQuantity(id, qty); }
            renderCart();
        }
        
        function removeItem(id) {
            Cart.removeItem(id);
            renderCart();
        }
        
        function clearCart() {
            if (confirm('Clear all items from cart?')) {
                Cart.clearCart();
                renderCart();
            }
        }
        
        function goToCheckout() {
            window.location.href = 'checkout.html';
        }
        
        // Init
        renderCart();
        
        window.addEventListener('scroll', () => {
            const header = document.getElementById('topHeader');
            const navTop = document.getElementById('navTop');
            if (window.scrollY > 10) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
            if (navTop) navTop.classList.toggle('visible', window.scrollY > 300);
        });
        
        // Theme
        const savedTheme = localStorage.getItem('quickdukan_theme');
        if (savedTheme === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('toggleIcon').textContent = '☀️'; }
        document.getElementById('themeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('quickdukan_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.getElementById('toggleIcon').textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('nav-ripple');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2;
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                this.querySelector('.nav-ripple-container').appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            });
        });
    <script src="js/checkout-modal.js"></script>
    </script>
</body>
</html>
