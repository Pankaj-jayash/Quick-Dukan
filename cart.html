<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Quick Dukan</title>
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Header -->
    <header class="top-header" id="topHeader">
        <div class="header-brand" id="headerBrand">
            <span class="brand-icon">🛒</span>
            <span class="brand-text">
                <span class="quick">QUICK</span>
                <span class="dukan">Dukan</span>
            </span>
        </div>
        <div class="free-delivery" id="freeDeliveryBadge">
            <span class="truck-icon">🚚</span>
            <span class="exhaust">💨</span>
            <span class="free-text">Free Delivery*</span>
            <div class="road-lines"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="toggle-icon">🌙</span>
        </button>
    </header>

    <!-- Cart Content -->
    <main class="cart-main">
        <div class="cart-header">
            <h2>🛒 My Cart</h2>
            <span class="cart-count" id="cartCount">(0 items)</span>
            <button class="btn-clear-all" id="clearAllBtn" style="display: none;">
                <i class="fa-solid fa-trash"></i> Clear All
            </button>
        </div>

        <div class="cart-items" id="cartItems"></div>

        <div class="cart-empty" id="cartEmpty">
            <div class="empty-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>"Kuch to add karo, khali pet kya?" 😄</p>
            <a href="index.html" class="btn btn-primary">🛍️ Start Shopping</a>
        </div>

        <div class="cart-summary" id="cartSummary" style="display: none;">
            <div class="summary-row">
                <span>Selected Items:</span>
                <span id="selectedCount">0</span>
            </div>
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotalAmount">₹0</span>
            </div>
            <div class="summary-row">
                <span>Delivery:</span>
                <span class="free-delivery-text">FREE 🎉</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="totalAmount">₹0</span>
            </div>
            <div class="cart-actions">
                <a href="index.html" class="btn btn-outline">🛒 Continue Shopping</a>
                <button class="btn btn-primary" id="buySelectedBtn">🛍️ Buy Selected (0)</button>
            </div>
        </div>
    </main>

    <!-- Checkout Popup -->
    <div class="popup-overlay" id="checkoutPopupOverlay">
        <div class="checkout-popup" id="checkoutPopup">
            <button class="popup-close" id="checkoutPopupClose">✕</button>
            <div class="checkout-content" id="checkoutContent"></div>
        </div>
    </div>

    <!-- Order Success Popup -->
    <div class="popup-overlay" id="successPopupOverlay">
        <div class="success-popup" id="successPopup">
            <button class="popup-close" id="successPopupClose">✕</button>
            <div class="success-content">
                <div class="success-icons">🎉 ✅ 🎉</div>
                <h2>ORDER PLACED!</h2>
                <div class="success-details" id="successDetails"></div>
                <button class="btn btn-primary" id="viewMyOrdersBtn">📋 View My Orders</button>
                <button class="btn btn-outline" id="backToHomeBtn">🏠 Back to Home</button>
            </div>
        </div>
    </div>

    <!-- My Orders Popup -->
    <div class="popup-overlay" id="ordersPopupOverlay">
        <div class="orders-popup" id="ordersPopup">
            <button class="popup-close" id="ordersPopupClose">✕</button>
            <div class="orders-content" id="ordersContent"></div>
        </div>
    </div>

    <!-- Cart Toast -->
    <div class="cart-toast" id="cartToast">
        <span class="toast-icon">✅</span>
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <!-- Bottom Navbar -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-page="shop">
            <i class="fa-solid fa-grid-2"></i>
            <span class="nav-label">Shop</span>
        </button>
        <button class="nav-item active" data-page="cart" id="cartNavBtn">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
            <span class="nav-label">Cart</span>
        </button>
        <button class="nav-item" data-page="orders" id="myOrdersNavBtn">
            <i class="fa-solid fa-clipboard-list"></i>
            <span class="nav-label">My Orders</span>
        </button>
        <button class="nav-item top-btn" id="backToTopBtn">
            <i class="fa-solid fa-arrow-up"></i>
            <span class="nav-label">Top</span>
        </button>
    </nav>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart-page.js"></script>
</body>
</html>
