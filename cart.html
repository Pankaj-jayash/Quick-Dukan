<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart — Quick Dukan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="top-header" id="topHeader">
    <div class="header-brand" onclick="window.location.href='index.html'">
        <span class="brand-icon">🛒</span>
        <div class="brand-text-wrapper"><span class="brand-text"><span class="quick-text">QUICK</span><span class="dukan-text">DUKAN</span></span></div>
    </div>
    <div class="free-delivery"><div class="truck-icon-wrapper"><span class="truck-icon">🚚</span><span class="exhaust-puff">💨</span></div><span class="free-text">Free Delivery*</span><div class="road-lines"></div></div>
    <button class="theme-toggle" id="themeToggle"><span class="toggle-icon" id="toggleIcon">🌙</span></button>
</header>

<div class="main-content-full">
    <h1 class="section-heading">🛒 Your Cart</h1>
    <div id="cartEmpty"><div style="text-align:center;padding:60px 20px;"><span style="font-size:64px;">🛒</span><h2>Your cart is empty</h2><a href="index.html" style="display:inline-block;padding:12px 28px;background:#4A6FA5;color:#FFF;border-radius:50px;font-weight:700;text-decoration:none;">🛍️ Start Shopping</a></div></div>
    <div id="cartItemsContainer" style="display:none;">
        <div id="cartItemsList"></div>
        <div class="cart-summary">
            <div class="cart-summary-row"><span>Subtotal</span><span id="cartSubtotal">₹0</span></div>
            <div class="cart-summary-row"><span>Delivery</span><span style="color:#4CAF50;">FREE 🎉</span></div>
            <div class="cart-summary-row cart-total-row"><span>Total</span><span id="cartTotal">₹0</span></div>
            <button class="cart-clear-btn" onclick="clearCart()">🗑️ Clear Cart</button>
            <button class="cart-checkout-btn" onclick="CheckoutModal.open()">📦 Proceed to Checkout</button>
            <a href="index.html" style="display:block;text-align:center;padding:10px;color:#4A6FA5;font-weight:600;text-decoration:none;">🛍️ Continue Shopping</a>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="shop.html" class="nav-item"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
        <a href="cart.html" class="nav-item nav-cart active"><span class="nav-icon-wrapper"><span class="nav-icon">🛒</span><span class="cart-badge" id="cartBadge">0</span></span><span class="nav-label">Cart</span></a>
        <button class="nav-item nav-whatsapp" onclick="openWhatsApp()"><span class="nav-icon">💬</span><span class="nav-label">Whats</span></button>
        <button class="nav-item nav-top" id="navTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="nav-icon">⬆️</span><span class="nav-label">Top</span></button>
    </div>
</nav>

<script src="js/config.js"></script>
<script src="js/cart.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/checkout-modal.js"></script>

<script>
function openWhatsApp() {
    var msg = 'Hi Quick Dukan, I want to order...';
    var c = Cart.getCart();
    if(c.totalItems>0){msg='🛒 *Order*\n\n';c.items.forEach(function(i,k){msg+=(k+1)+'. '+i.name+' x'+i.quantity+' = ₹'+(i.price*i.quantity)+'\n';});msg+='\n💰 Total: ₹'+c.totalAmount;}
    window.open('https://wa.me/919876543210?text='+encodeURIComponent(msg),'_blank');
}
function renderCart() {
    var cart = Cart.getCart();
    document.getElementById('cartBadge').textContent = cart.totalItems;
    document.getElementById('cartBadge').classList.toggle('visible', cart.totalItems>0);
    if(cart.totalItems===0) { document.getElementById('cartEmpty').style.display='block'; document.getElementById('cartItemsContainer').style.display='none'; return; }
    document.getElementById('cartEmpty').style.display='none';
    document.getElementById('cartItemsContainer').style.display='block';
    document.getElementById('cartItemsList').innerHTML = cart.items.map(function(item) {
        return '<div class="cart-item-card"><div class="cart-item-icon">'+(item.icon||'📦')+'</div><div class="cart-item-details"><div class="cart-item-name">'+item.name+'</div><div class="cart-item-weight">'+(item.weight||'')+'</div><div class="cart-item-price">₹'+item.price+' × '+item.quantity+' = ₹'+(item.price*item.quantity)+'</div></div><div class="cart-item-actions"><div class="cart-qty-controls"><button class="cart-qty-btn" onclick="updateQty(\''+item.id+'\','+(item.quantity-1)+')">−</button><span>'+item.quantity+'</span><button class="cart-qty-btn" onclick="updateQty(\''+item.id+'\','+(item.quantity+1)+')">+</button></div><button class="cart-remove-btn" onclick="removeItem(\''+item.id+'\')">❌</button></div></div>';
    }).join('');
    document.getElementById('cartSubtotal').textContent = '₹'+cart.totalAmount;
    document.getElementById('cartTotal').textContent = '₹'+cart.totalAmount;
}
function updateQty(id, qty) { if(qty<=0) Cart.removeItem(id); else Cart.updateQuantity(id, qty); renderCart(); }
function removeItem(id) { Cart.removeItem(id); renderCart(); }
function clearCart() { if(confirm('Clear cart?')) { Cart.clearCart(); renderCart(); } }
renderCart();
window.addEventListener('cartUpdated', function() { renderCart(); });
if(localStorage.getItem('quickdukan_theme')==='dark'){document.body.classList.add('dark-mode');document.getElementById('toggleIcon').textContent='☀️';}
document.getElementById('themeToggle').onclick=function(){document.body.classList.toggle('dark-mode');localStorage.setItem('quickdukan_theme',document.body.classList.contains('dark-mode')?'dark':'light');document.getElementById('toggleIcon').textContent=document.body.classList.contains('dark-mode')?'☀️':'🌙';};
window.addEventListener('scroll',function(){document.getElementById('topHeader').classList.toggle('scrolled',window.scrollY>10);var t=document.getElementById('navTop');if(t)t.classList.toggle('visible',window.scrollY>300);});
</script>
</body>
</html>
