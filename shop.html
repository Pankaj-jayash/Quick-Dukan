<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Quick Dukan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    
    <!-- ==================== TOP HEADER ==================== -->
    <header class="top-header" id="topHeader">
        <div class="header-brand" onclick="window.location.href='index.html'">
            <span class="brand-icon">🛒</span>
            <div class="brand-text-wrapper">
                <span class="brand-text">
                    <span class="quick-text">QUICK</span>
                    <span class="dukan-text">DUKAN</span>
                </span>
            </div>
        </div>
        <div class="free-delivery">
            <div class="truck-icon-wrapper">
                <span class="truck-icon">🚚</span>
                <span class="exhaust-puff">💨</span>
            </div>
            <span class="free-text">Free Delivery*</span>
            <div class="road-lines"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="toggle-icon" id="toggleIcon">🌙</span>
        </button>
    </header>
    
    <!-- ==================== SEARCH BAR ==================== -->
    <div class="search-wrapper" id="searchWrapper">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="Search all products..." autocomplete="off">
            <span class="voice-icon">🎤</span>
        </div>
        <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
    </div>
    
    <!-- ==================== SHOP CONTENT ==================== -->
    <div class="main-content-full">
        
        <!-- Loading -->
        <div class="products-loading" id="productsLoading">
            <div class="loading-spinner">
                <div class="spinner-circle"></div>
                <div class="spinner-circle spinner-inner"></div>
                <div class="spinner-icon">🛒</div>
            </div>
            <p class="loading-text">Loading all products...</p>
        </div>
        
        <!-- Shop Header -->
        <div class="shop-header" id="shopHeader" style="display:none;">
            <h2 class="section-heading">🛍️ All Products</h2>
            <p class="shop-count" id="shopCount"></p>
        </div>
        
        <!-- All Products Grid -->
        <div class="products-grid" id="allProductsGrid"></div>
        
    </div>
    
    <!-- ==================== CART TOAST ==================== -->
    <div class="cart-toast" id="cartToast">
        <span class="toast-icon">✅</span>
        <div class="toast-content">
            <span class="toast-title">Added to Cart!</span>
            <span class="toast-product" id="toastProduct"></span>
        </div>
        <span class="toast-close" onclick="document.getElementById('cartToast').classList.remove('show')">✕</span>
    </div>
    
    <!-- ==================== BOTTOM NAVBAR ==================== -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-inner">
            <button class="nav-item" data-page="home" onclick="navigateTo('index.html')" aria-label="Home">
                <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item active" data-page="shop" aria-label="Shop">
                <span class="nav-icon">🛍️</span><span class="nav-label">Shop</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-cart" data-page="cart" onclick="navigateTo('cart.html')" aria-label="Cart">
                <span class="nav-icon-wrapper">
                    <span class="nav-icon">🛒</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </span>
                <span class="nav-label">Cart</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-whatsapp" onclick="openWhatsApp()" aria-label="WhatsApp">
                <span class="nav-icon">💬</span><span class="nav-label">Whats</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
            <button class="nav-item nav-top" id="navTop" onclick="scrollToTop()" aria-label="Back to Top">
                <span class="nav-icon" id="topIcon">⬆️</span><span class="nav-label">Top</span>
                <span class="nav-dot"></span><span class="nav-ripple-container"></span>
            </button>
        </div>
    </nav>
    
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    
    <script>
        function navigateTo(url) { window.location.href = url; }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        function openWhatsApp() {
            const cart = Cart.getCart();
            let message = 'Hi Quick Dukan, I want to order groceries...';
            if (cart.totalItems > 0) {
                message = '🛒 *Quick Dukan — Order*\n\n';
                cart.items.forEach((item, i) => { message += `${i+1}. ${item.name} × ${item.quantity} = ₹${item.price * item.quantity}\n`; });
                message += `\n💰 Total: ₹${cart.totalAmount}`;
            }
            window.open(`https://wa.me/${CONFIG.store.phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        async function loadAllProducts() {
            await Products.loadAllProducts();
            UI.hideLoading();
            
            const allProducts = Products.allProducts;
            document.getElementById('shopHeader').style.display = 'block';
            document.getElementById('shopCount').textContent = `${allProducts.length} products available`;
            
            Products.renderProductCards(allProducts, 'allProductsGrid');
            
            // Override card click to add toast
            document.querySelectorAll('.card-add-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const productId = btn.dataset.productId;
                    const product = allProducts.find(p => p.id === productId);
                    if (product) {
                        Cart.addItem(product, 1);
                        UI.showCartToast(product.name);
                        UI.addToRecentlyViewed(product);
                        UI.updateCartBadge(Cart.getCart().totalItems);
                    }
                });
            });
        }
        
        // Init
        Theme.init();
        
        window.addEventListener('scroll', () => {
            const header = document.getElementById('topHeader');
            const search = document.getElementById('searchWrapper');
            const navTop = document.getElementById('navTop');
            if (window.scrollY > 10) { header.classList.add('scrolled'); if (search) search.classList.add('scrolled'); }
            else { header.classList.remove('scrolled'); if (search) search.classList.remove('scrolled'); }
            if (navTop) navTop.classList.toggle('visible', window.scrollY > 300);
        });
        
        const cart = Cart.getCart();
        UI.updateCartBadge(cart.totalItems);
        window.addEventListener('cartUpdated', (e) => { UI.updateCartBadge(e.detail.cart.totalItems); });
        
        document.getElementById('themeToggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('quickdukan_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            document.getElementById('toggleIcon').textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        });
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('nav-ripple');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height) * 2;
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
                this.querySelector('.nav-ripple-container').appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            });
        });
        
        loadAllProducts();
    <script src="js/checkout-modal.js"></script>
    </script>
</body>
</html>
