<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Quick Dukan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header class="top-header" id="topHeader">
    <div class="header-brand" onclick="window.location.href='index.html'">
        <span class="brand-icon">🛒</span>
        <div class="brand-text-wrapper"><span class="brand-text"><span class="quick-text">QUICK</span><span class="dukan-text">DUKAN</span></span></div>
    </div>
    <div class="free-delivery"><div class="truck-icon-wrapper"><span class="truck-icon">🚚</span><span class="exhaust-puff">💨</span></div><span class="free-text">Free Delivery*</span><div class="road-lines"></div></div>
    <button class="theme-toggle" id="themeToggle"><span class="toggle-icon" id="toggleIcon">🌙</span></button>
</header>

<div class="main-content-full">
    <div class="products-loading" id="productsLoading">
        <div class="loading-spinner"><div class="spinner-circle"></div><div class="spinner-circle spinner-inner"></div><div class="spinner-icon">🛒</div></div>
        <p class="loading-text">Loading all products...</p>
    </div>
    <div class="shop-header" id="shopHeader" style="display:none;">
        <h2 class="section-heading">🛍️ All Products</h2>
        <p class="shop-count" id="shopCount"></p>
    </div>
    <div class="products-grid" id="allProductsGrid"></div>
</div>

<div class="cart-toast" id="cartToast">
    <span class="toast-icon">✅</span>
    <div class="toast-content"><span class="toast-title">Added to Cart!</span><span class="toast-product" id="toastProduct"></span></div>
    <span class="toast-close" onclick="this.parentElement.classList.remove('show')">✕</span>
</div>

<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="shop.html" class="nav-item active"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
        <a href="cart.html" class="nav-item nav-cart"><span class="nav-icon-wrapper"><span class="nav-icon">🛒</span><span class="cart-badge" id="cartBadge">0</span></span><span class="nav-label">Cart</span></a>
        <button class="nav-item nav-whatsapp" onclick="openWhatsApp()"><span class="nav-icon">💬</span><span class="nav-label">Whats</span></button>
        <button class="nav-item nav-top" id="navTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="nav-icon">⬆️</span><span class="nav-label">Top</span></button>
    </div>
</nav>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/checkout-modal.js"></script>

<script>
function openWhatsApp() {
    var msg = 'Hi Quick Dukan...';
    var c = Cart.getCart();
    if(c.totalItems>0){msg='🛒 *Order*\n\n';c.items.forEach(function(i,k){msg+=(k+1)+'. '+i.name+' x'+i.quantity+' = ₹'+(i.price*i.quantity)+'\n';});msg+='\n💰 Total: ₹'+c.totalAmount;}
    window.open('https://wa.me/919876543210?text='+encodeURIComponent(msg),'_blank');
}
Products.loadAllProducts().then(function() {
    UI.hideLoading();
    document.getElementById('shopHeader').style.display = 'block';
    document.getElementById('shopCount').textContent = Products.allProducts.length + ' products available';
    Products.renderProductCards(Products.allProducts, 'allProductsGrid');
});
if(localStorage.getItem('quickdukan_theme')==='dark'){document.body.classList.add('dark-mode');document.getElementById('toggleIcon').textContent='☀️';}
document.getElementById('themeToggle').onclick=function(){document.body.classList.toggle('dark-mode');localStorage.setItem('quickdukan_theme',document.body.classList.contains('dark-mode')?'dark':'light');document.getElementById('toggleIcon').textContent=document.body.classList.contains('dark-mode')?'☀️':'🌙';};
window.addEventListener('scroll',function(){document.getElementById('topHeader').classList.toggle('scrolled',window.scrollY>10);var t=document.getElementById('navTop');if(t)t.classList.toggle('visible',window.scrollY>300);});
var c=Cart.getCart();UI.updateCartBadge(c.totalItems);window.addEventListener('cartUpdated',function(e){UI.updateCartBadge(e.detail.cart.totalItems);});
</script>
</body>
</html>
