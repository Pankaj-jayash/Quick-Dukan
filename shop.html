<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Quick Dukan</title>
    
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Header -->
    <header class="top-header" id="topHeader">
        <div class="header-brand" id="headerBrand">
            <span class="brand-icon">🛒</span>
            <span class="brand-text">
                <span class="quick">QUICK</span>
                <span class="dukan">Dukan</span>
            </span>
        </div>
        <div class="free-delivery" id="freeDeliveryBadge">
            <span class="truck-icon">🚚</span>
            <span class="exhaust">💨</span>
            <span class="free-text">Free Delivery*</span>
            <div class="road-lines"></div>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <span class="toggle-icon">🌙</span>
        </button>
    </header>

    <!-- Search Bar -->
    <section class="search-section" id="searchSection">
        <div class="search-container" id="searchContainer">
            <span class="search-icon-left" id="voiceSearchBtn">
                <i class="fa-solid fa-microphone"></i>
            </span>
            <input type="text" class="search-input" id="searchInput" placeholder="Biwi ne list di? Copy-paste karo yahan! 😅" autocomplete="off">
            <span class="search-icon-right" id="searchBtn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
        </div>
    </section>

    <!-- Search Results Modal -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-modal" id="searchModal">
            <div class="search-modal-header">
                <h3 id="searchModalTitle">🔍 Search Results</h3>
                <button class="search-modal-close" id="searchModalClose">✕</button>
            </div>
            <div class="search-modal-body" id="searchModalBody"></div>
        </div>
    </div>

    <!-- Shop Content -->
    <main class="shop-main">
        <aside class="filter-sidebar" id="filterSidebar">
            <div class="filter-header">
                <h3>🔍 Filters</h3>
                <button class="filter-close-mobile" id="filterCloseMobile">✕</button>
            </div>
            <div class="filter-section">
                <h4>Categories</h4>
                <div class="filter-categories" id="filterCategories"></div>
            </div>
            <div class="filter-section">
                <h4>Price Range</h4>
                <div class="price-range">
                    <input type="range" min="0" max="1000" value="1000" id="priceRange" step="10">
                    <div class="price-labels">
                        <span>₹0</span>
                        <span id="maxPriceLabel">₹1000</span>
                    </div>
                </div>
            </div>
            <button class="btn btn-outline filter-reset" id="filterReset">Reset Filters</button>
        </aside>
        
        <div class="shop-products-area">
            <div class="shop-header">
                <h2>🛍️ All Products</h2>
                <div class="shop-controls">
                    <button class="btn-filter-toggle" id="filterToggle">
                        <i class="fa-solid fa-filter"></i> Filters
                    </button>
                    <select class="sort-select" id="sortSelect">
                        <option value="popular">Most Popular</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name">Name: A to Z</option>
                    </select>
                </div>
            </div>
            <div class="product-grid" id="shopProductGrid"></div>
            <div class="shop-empty" id="shopEmpty" style="display: none;">
                <p>😕 No products found!</p>
                <button class="btn btn-outline" id="shopResetFilters">Clear Filters</button>
            </div>
        </div>
    </main>

    <!-- Product Detail Popup -->
    <div class="popup-overlay" id="productPopupOverlay">
        <div class="product-popup" id="productPopup">
            <button class="popup-close" id="productPopupClose">✕</button>
            <div class="popup-content" id="productPopupContent"></div>
        </div>
    </div>

    <!-- Checkout Popup -->
    <div class="popup-overlay" id="checkoutPopupOverlay">
        <div class="checkout-popup" id="checkoutPopup">
            <button class="popup-close" id="checkoutPopupClose">✕</button>
            <div class="checkout-content" id="checkoutContent"></div>
        </div>
    </div>

    <!-- Order Success Popup -->
    <div class="popup-overlay" id="successPopupOverlay">
        <div class="success-popup" id="successPopup">
            <button class="popup-close" id="successPopupClose">✕</button>
            <div class="success-content">
                <div class="success-icons">🎉 ✅ 🎉</div>
                <h2>ORDER PLACED!</h2>
                <div class="success-details" id="successDetails"></div>
                <button class="btn btn-primary" id="viewMyOrdersBtn">📋 View My Orders</button>
                <button class="btn btn-outline" id="backToHomeBtn">🏠 Back to Home</button>
            </div>
        </div>
    </div>

    <!-- My Orders Popup -->
    <div class="popup-overlay" id="ordersPopupOverlay">
        <div class="orders-popup" id="ordersPopup">
            <button class="popup-close" id="ordersPopupClose">✕</button>
            <div class="orders-content" id="ordersContent"></div>
        </div>
    </div>

    <!-- Cart Toast -->
    <div class="cart-toast" id="cartToast">
        <span class="toast-icon">✅</span>
        <span class="toast-message" id="toastMessage"></span>
    </div>

    <!-- Bottom Navbar -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item" data-page="home">
            <i class="fa-solid fa-house"></i>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item active" data-page="shop">
            <i class="fa-solid fa-grid-2"></i>
            <span class="nav-label">Shop</span>
        </button>
        <button class="nav-item" data-page="cart" id="cartNavBtn">
            <i class="fa-solid fa-bag-shopping"></i>
            <span class="cart-badge" id="cartBadge" style="display: none;">0</span>
            <span class="nav-label">Cart</span>
        </button>
        <button class="nav-item" data-page="orders" id="myOrdersNavBtn">
            <i class="fa-solid fa-clipboard-list"></i>
            <span class="nav-label">My Orders</span>
        </button>
        <button class="nav-item top-btn" id="backToTopBtn">
            <i class="fa-solid fa-arrow-up"></i>
            <span class="nav-label">Top</span>
        </button>
    </nav>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/search.js"></script>
    <script src="js/recent.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
