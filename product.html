<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail — Quick Dukan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<!-- ========== TOP HEADER ========== -->
<header class="top-header" id="topHeader">
    <div class="header-brand" onclick="window.location.href='index.html'">
        <span class="brand-icon">🛒</span>
        <div class="brand-text-wrapper">
            <span class="brand-text"><span class="quick-text">QUICK</span><span class="dukan-text">DUKAN</span></span>
        </div>
    </div>
    <div class="free-delivery">
        <div class="truck-icon-wrapper"><span class="truck-icon">🚚</span><span class="exhaust-puff">💨</span></div>
        <span class="free-text">Free Delivery*</span>
        <div class="road-lines"></div>
    </div>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="toggle-icon" id="toggleIcon">🌙</span>
    </button>
</header>

<!-- ========== MAIN CONTENT ========== -->
<div class="main-content-full">

    <div class="products-loading" id="productsLoading">
        <div class="loading-spinner"><div class="spinner-circle"></div><div class="spinner-circle spinner-inner"></div><div class="spinner-icon">🛒</div></div>
        <p class="loading-text">Loading product...</p>
    </div>

    <div class="product-breadcrumb" id="productBreadcrumb" style="display:none;">
        <a href="index.html">Home</a> › <span id="breadcrumbCategory"></span> › <span id="breadcrumbName"></span>
    </div>

    <div class="product-detail-container" id="productDetail" style="display:none;">
        <div class="product-detail-image">
            <div class="detail-image-wrapper" id="detailImageWrapper">
                <div class="detail-image-placeholder" id="detailImagePlaceholder">📦</div>
            </div>
        </div>
        <div class="product-detail-info">
            <h1 class="detail-name" id="detailName"></h1>
            <div class="detail-rating" id="detailRating"></div>
            <div class="detail-price-section">
                <span class="detail-price" id="detailPrice"></span>
                <span class="detail-mrp" id="detailMrp"></span>
                <span class="detail-discount" id="detailDiscount"></span>
            </div>
            <div class="detail-weight" id="detailWeight"></div>
            <div class="detail-desc" id="detailDesc"></div>
            <div class="detail-quantity">
                <span>Qty:</span>
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <span class="qty-value" id="qtyValue">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <div class="detail-actions">
                <button class="detail-add-btn" onclick="addProductToCart()">🛒 Add to Cart</button>
                <button class="detail-buy-btn" onclick="buyNowProduct()">⚡ Buy Now</button>
            </div>
            <button class="detail-share-btn" onclick="shareProduct()">📤 Share</button>
        </div>
    </div>

    <div class="related-products-section" id="relatedSection" style="display:none;">
        <h2 class="section-heading">🔗 Related Products</h2>
        <div class="products-grid" id="relatedGrid"></div>
    </div>

</div>

<!-- ========== CART TOAST ========== -->
<div class="cart-toast" id="cartToast">
    <span class="toast-icon">✅</span>
    <div class="toast-content"><span class="toast-title">Added to Cart!</span><span class="toast-product" id="toastProduct"></span></div>
    <span class="toast-close" onclick="this.parentElement.classList.remove('show')">✕</span>
</div>

<!-- ========== BOTTOM NAVBAR ========== -->
<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
        <a href="shop.html" class="nav-item"><span class="nav-icon">🛍️</span><span class="nav-label">Shop</span></a>
        <a href="cart.html" class="nav-item nav-cart">
            <span class="nav-icon-wrapper"><span class="nav-icon">🛒</span><span class="cart-badge" id="cartBadge">0</span></span>
            <span class="nav-label">Cart</span>
        </a>
        <button class="nav-item nav-whatsapp" onclick="openWhatsApp()"><span class="nav-icon">💬</span><span class="nav-label">Whats</span></button>
        <button class="nav-item nav-top" id="navTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="nav-icon">⬆️</span><span class="nav-label">Top</span></button>
    </div>
</nav>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/theme.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/checkout-modal.js"></script>

<script>
var currentProduct = null;
var currentQty = 1;

function changeQty(d) { currentQty = Math.max(1, currentQty + d); document.getElementById('qtyValue').textContent = currentQty; }
function openWhatsApp() {
    var msg = 'Hi Quick Dukan, I want to order...';
    if(typeof Cart!=='undefined'){var c=Cart.getCart();if(c.totalItems>0){msg='🛒 *Order*\n\n';c.items.forEach(function(i,k){msg+=(k+1)+'. '+i.name+' x'+i.quantity+' = ₹'+(i.price*i.quantity)+'\n';});msg+='\n💰 Total: ₹'+c.totalAmount;}}
    window.open('https://wa.me/919876543210?text='+encodeURIComponent(msg),'_blank');
}
function addProductToCart() { if(!currentProduct) return; Cart.addItem(currentProduct, currentQty); UI.showCartToast(currentProduct.name); UI.addToRecentlyViewed(currentProduct); UI.updateCartBadge(Cart.getCart().totalItems); }
function buyNowProduct() { if(!currentProduct) return; var p = Object.assign({}, currentProduct, {quantity: currentQty}); CheckoutModal.open(p); }
function shareProduct() { if(!currentProduct) return; if(navigator.share) navigator.share({title:currentProduct.name,text:currentProduct.name+' — ₹'+currentProduct.price,url:window.location.href}); else alert(currentProduct.name+' — ₹'+currentProduct.price); }

// Load product
var params = new URLSearchParams(window.location.search);
var productId = params.get('id');
if (productId) {
    Products.loadAllProducts().then(function() {
        var product = Products.allProducts.find(function(p) { return p.id === productId; });
        if (product) {
            currentProduct = product;
            document.getElementById('productsLoading').style.display = 'none';
            document.getElementById('productBreadcrumb').style.display = 'block';
            document.getElementById('productDetail').style.display = 'grid';
            document.getElementById('detailImagePlaceholder').textContent = product.icon || '📦';
            document.getElementById('detailName').textContent = product.name;
            document.getElementById('detailPrice').textContent = '₹' + product.price;
            document.getElementById('detailWeight').textContent = product.weight || '';
            document.getElementById('detailDesc').textContent = product.description || 'Fresh product from Quick Dukan.';
            document.getElementById('breadcrumbName').textContent = product.name;
            if (product.mrp) {
                document.getElementById('detailMrp').textContent = '₹' + product.mrp;
                document.getElementById('detailDiscount').textContent = Math.round(((product.mrp-product.price)/product.mrp)*100) + '% OFF';
            }
            if (product.rating) document.getElementById('detailRating').innerHTML = '⭐'.repeat(Math.round(product.rating)) + ' ' + product.rating + ' (' + (product.reviews||0) + ')';
            UI.addToRecentlyViewed(product);
            // Related
            var related = Products.allProducts.filter(function(p) { return p.id !== product.id; }).slice(0, 4);
            if (related.length > 0) { document.getElementById('relatedSection').style.display = 'block'; Products.renderProductCards(related, 'relatedGrid'); }
        }
    });
} else {
    document.getElementById('productsLoading').innerHTML = '<p style="text-align:center;padding:40px;">Product not found.</p>';
}

// Theme
if (localStorage.getItem('quickdukan_theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('toggleIcon').textContent = '☀️'; }
document.getElementById('themeToggle').onclick = function() { document.body.classList.toggle('dark-mode'); localStorage.setItem('quickdukan_theme', document.body.classList.contains('dark-mode')?'dark':'light'); document.getElementById('toggleIcon').textContent = document.body.classList.contains('dark-mode')?'☀️':'🌙'; };
window.addEventListener('scroll', function() { document.getElementById('topHeader').classList.toggle('scrolled', window.scrollY>10); var t=document.getElementById('navTop'); if(t) t.classList.toggle('visible', window.scrollY>300); });
if(typeof Cart!=='undefined'){var c=Cart.getCart(); UI.updateCartBadge(c.totalItems); window.addEventListener('cartUpdated',function(e){UI.updateCartBadge(e.detail.cart.totalItems);});}
</script>

</body>
</html>
